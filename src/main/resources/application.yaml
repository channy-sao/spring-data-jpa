server:
  port: 8080
spring:
  application:
    name: spring_data_jpa

  logging:
    file:
      name: ./logs/spring-data-jpa.log
    logback:
      rollingPolicy:
        max-file-size: 50MB
        max-history: 7
        file-name-pattern: ${logging.file.name}.%d{yyyy-MM-dd}.%i.log
    level:
      web: info
      root: info

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_data_jpa
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update # Options: none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true


springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    enabled: true